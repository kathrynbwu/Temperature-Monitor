<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForearmSense — Single Sensor Test</title>
<style>
  :root {
    --bg:         #0a0e14;
    --surface:    #111720;
    --border:     #1e2a3a;
    --text:       #c8d8e8;
    --text-dim:   #4a6070;
    --accent:     #00e5ff;
    --accent-dim: #003d4d;
    --good:    #00e676;
    --warn:    #ffea00;
    --hot:     #ff5722;
    --error:   #ff1744;
    --offline: #37474f;
    --font-display: 'Segoe UI', system-ui, sans-serif;
    --font-mono:    'Courier New', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
    padding: 28px 32px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .logo span { color: var(--accent); }
  .logo .sub {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    font-weight: 400;
    display: block;
    margin-top: 2px;
    text-transform: uppercase;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .pulse-ring {
    position: relative;
    width: 12px;
    height: 12px;
  }
  .pulse-ring::before, .pulse-ring::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--offline);
  }
  .pulse-ring::after {
    background: transparent;
    border: 2px solid var(--offline);
    animation: none;
  }
  .pulse-ring.connected::before { background: var(--good); }
  .pulse-ring.connected::after  { border-color: var(--good); animation: pulse-expand 1.6s ease-out infinite; }
  .pulse-ring.reading::before   { background: var(--warn); }
  .pulse-ring.reading::after    { border-color: var(--warn); animation: pulse-expand 0.8s ease-out infinite; }
  .pulse-ring.error::before     { background: var(--error); }

  @keyframes pulse-expand {
    0%   { transform: scale(1);   opacity: 1; }
    100% { transform: scale(2.8); opacity: 0; }
  }

  #status-text           { color: var(--text-dim); }
  #status-text.connected { color: var(--good); }
  #status-text.reading   { color: var(--warn); }
  #status-text.error     { color: var(--error); }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
    padding: 40px 32px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  #connect-btn {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 14px 40px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 0 30px rgba(0,229,255,0.25);
  }
  #connect-btn:hover    { opacity: 0.85; transform: translateY(-1px); }
  #connect-btn:active   { transform: translateY(0); }
  #connect-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Big temperature display ── */
  .temp-display {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  .temp-display.good { border-color: var(--good); box-shadow: 0 0 40px rgba(0,230,118,0.1); }
  .temp-display.warn { border-color: var(--warn); box-shadow: 0 0 40px rgba(255,234,0,0.1); }
  .temp-display.hot  { border-color: var(--hot);  box-shadow: 0 0 40px rgba(255,87,34,0.12); }
  .temp-display.err  { border-color: var(--error); opacity: 0.6; }

  .temp-label {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .temp-value {
    font-size: 5rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.04em;
    line-height: 1;
    transition: color 0.4s;
  }
  .temp-value.good { color: var(--good); }
  .temp-value.warn { color: var(--warn); }
  .temp-value.hot  { color: var(--hot);  }

  .temp-unit {
    font-size: 1.2rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .temp-status {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .temp-status.good { color: var(--good); }
  .temp-status.warn { color: var(--warn); }
  .temp-status.hot  { color: var(--hot);  }
  .temp-status.err  { color: var(--error); }

  /* ── Stats bar ── */
  .stats-bar {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    overflow: hidden;
  }
  .stat-cell {
    padding: 16px 20px;
    border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-cell .sc-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-cell .sc-value {
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
  }

  /* ── Raw debug panel ── */
  .debug-panel {
    width: 100%;
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .debug-panel .dp-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .debug-panel .dp-value {
    font-size: 0.85rem;
    color: var(--accent);
  }

  #compat-warn {
    display: none;
    background: #1a0a00;
    border: 1px solid var(--hot);
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 0.8rem;
    color: var(--hot);
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    Forearm<span>Sense</span>
    <span class="sub">Single Sensor Test</span>
  </div>
  <div class="status-pill">
    <div class="pulse-ring" id="pulse-ring"></div>
    <span id="status-text">DISCONNECTED</span>
  </div>
</header>

<main>

  <div id="compat-warn">
    ⚠ Web Bluetooth only works in <strong>Chrome</strong> or <strong>Edge</strong>.
    Safari and Firefox are not supported.
  </div>

  <button id="connect-btn">Connect to ForearmSense</button>

  <!-- Big temperature readout -->
  <div class="temp-display" id="temp-display">
    <div class="temp-label">Sensor 1 · TMP117</div>
    <div class="temp-value" id="temp-value">—</div>
    <div class="temp-unit">degrees Celsius</div>
    <div class="temp-status" id="temp-status">Waiting for data</div>
  </div>

  <!-- Min / Max / Last update -->
  <div class="stats-bar">
    <div class="stat-cell">
      <div class="sc-label">Session Max</div>
      <div class="sc-value" id="stat-max">—</div>
    </div>
    <div class="stat-cell">
      <div class="sc-label">Session Min</div>
      <div class="sc-value" id="stat-min">—</div>
    </div>
    <div class="stat-cell">
      <div class="sc-label">Last Update</div>
      <div class="sc-value" id="stat-time">—</div>
    </div>
  </div>

  <!-- Raw bytes — useful for debugging -->
  <div class="debug-panel">
    <div class="dp-label">Raw BLE bytes (hex) — useful for debugging</div>
    <div class="dp-value" id="debug-raw">—</div>
  </div>

</main>

<script>
const SERVICE_UUID        = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

let bleDevice = null;
let sessionMax = null;
let sessionMin = null;

const connectBtn  = document.getElementById('connect-btn');
const pulseRing   = document.getElementById('pulse-ring');
const statusText  = document.getElementById('status-text');
const compatWarn  = document.getElementById('compat-warn');
const tempDisplay = document.getElementById('temp-display');
const tempValue   = document.getElementById('temp-value');
const tempStatus  = document.getElementById('temp-status');
const debugRaw    = document.getElementById('debug-raw');

if (!navigator.bluetooth) {
  compatWarn.style.display = 'block';
  connectBtn.disabled = true;
}

connectBtn.addEventListener('click', async () => {
  try {
    setStatus('connecting');

    bleDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,              // shows all BLE devices so you can find it
      optionalServices: [SERVICE_UUID]
    });

    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    const server  = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const char    = await service.getCharacteristic(CHARACTERISTIC_UUID);

    await char.startNotifications();
    char.addEventListener('characteristicvaluechanged', onDataReceived);

    setStatus('connected');
    connectBtn.textContent = 'Disconnect';
    connectBtn.onclick = disconnect;

  } catch (err) {
    console.error('BLE error:', err);
    setStatus('error');
    setTimeout(() => setStatus('disconnected'), 3000);
  }
});

function disconnect() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
}

function onDisconnected() {
  setStatus('disconnected');
  connectBtn.textContent = 'Connect to ForearmSense';
  connectBtn.onclick = null;
  connectBtn.addEventListener('click', arguments.callee);
  tempValue.textContent = '—';
  tempStatus.textContent = 'Waiting for data';
  tempDisplay.className = 'temp-display';
  tempValue.className = 'temp-value';
  tempStatus.className = 'temp-status';
  debugRaw.textContent = '—';
}

function onDataReceived(event) {
  const view = event.target.value;

  // Show raw hex bytes for debugging
  let hex = '';
  for (let i = 0; i < view.byteLength; i++) {
    hex += '0x' + view.getUint8(i).toString(16).padStart(2, '0').toUpperCase();
    if (i < view.byteLength - 1) hex += ' ';
  }
  debugRaw.textContent = hex + ` (${view.byteLength} bytes)`;

  // Parse 2 bytes → int16 → temperature
  if (view.byteLength < 2) {
    console.warn('Unexpected payload size:', view.byteLength);
    return;
  }

  const raw = view.getInt16(0, false); // big-endian

  if (raw === 0x7FFF) {
    // Sensor error sentinel
    tempValue.textContent = 'ERR';
    tempStatus.textContent = 'Sensor not responding — check wiring';
    setCardClass('err');
  } else {
    const tempC = raw * 0.0078125;
    const cls   = classify(tempC);

    tempValue.textContent  = tempC.toFixed(2);
    tempStatus.textContent = statusLabel(cls);
    setCardClass(cls);

    // Session min/max
    if (sessionMax === null || tempC > sessionMax) sessionMax = tempC;
    if (sessionMin === null || tempC < sessionMin) sessionMin = tempC;
    document.getElementById('stat-max').textContent = sessionMax.toFixed(2) + ' °C';
    document.getElementById('stat-min').textContent = sessionMin.toFixed(2) + ' °C';
  }

  // Timestamp
  const now = new Date();
  const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  document.getElementById('stat-time').textContent = t;

  // Brief "reading" flash
  setStatus('reading');
  clearTimeout(window._readingTimer);
  window._readingTimer = setTimeout(() => setStatus('connected'), 600);
}

function classify(t) {
  if (t > 37.5) return 'hot';
  if (t > 35.0) return 'warn';
  return 'good';
}

function statusLabel(cls) {
  return { good: 'Normal range', warn: 'Elevated', hot: 'High temperature' }[cls] || '';
}

function setCardClass(cls) {
  tempDisplay.className = 'temp-display ' + cls;
  tempValue.className   = 'temp-value '   + cls;
  tempStatus.className  = 'temp-status '  + cls;
}

function setStatus(state) {
  const states = {
    disconnected: { label: 'DISCONNECTED', cls: ''         },
    connecting:   { label: 'CONNECTING…',  cls: 'reading'  },
    connected:    { label: 'CONNECTED',    cls: 'connected' },
    reading:      { label: 'RECEIVING',    cls: 'reading'   },
    error:        { label: 'ERROR',        cls: 'error'     },
  };
  const s = states[state] || states.disconnected;
  statusText.textContent = s.label;
  statusText.className   = s.cls;
  pulseRing.className    = 'pulse-ring ' + s.cls;
}
</script>

</body>
</html>
